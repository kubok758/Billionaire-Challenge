<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    :root {
      --bg: #f1f3f5;
      --card: #ffffff;
      --text: #121212;
      --muted: #737b83;
      --green: #079a55;
      --green-dark: #047943;
      --red: #ef3b33;
      --red-dark: #c92c26;
      --line: #dfe5ea;
      --shadow: 0 16px 40px rgba(0, 0, 0, .08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
    }
    button, select, input { font: inherit; }
    .app { max-width: 1220px; margin: 0 auto; padding: 24px 18px 80px; }
    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      gap: 14px; margin-bottom: 22px;
    }
    .brand { display: flex; align-items: center; gap: 12px; font-weight: 900; letter-spacing: .3px; }
    .hamburger {
      width: 44px; height: 44px; border: 0; border-radius: 14px;
      background: #fff; box-shadow: var(--shadow); cursor: pointer;
      font-size: 26px; line-height: 1;
    }
    .brand small {
      display: block; color: var(--muted); font-size: 12px; font-weight: 800;
      letter-spacing: 1.8px; text-transform: uppercase;
    }
    .top-actions { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; justify-content: flex-end; }
    .select, .mode-select {
      min-height: 44px; padding: 0 14px; border: 1px solid var(--line);
      border-radius: 14px; background: #fff; color: var(--text);
      outline: none; font-weight: 800;
    }
    .hero {
      background: linear-gradient(180deg, rgba(255,255,255,.94), rgba(255,255,255,.72));
      border: 1px solid rgba(255,255,255,.75);
      border-radius: 32px; box-shadow: var(--shadow);
      padding: 26px; overflow: hidden; position: relative;
    }
    .hero-grid { display: grid; grid-template-columns: 220px 1fr; gap: 28px; align-items: center; }
    .person { text-align: center; }
    .avatar-wrap {
      width: 160px; height: 160px; margin: 0 auto 14px; border-radius: 50%;
      background: linear-gradient(135deg, #d4f6e4, #77d3ba);
      display: grid; place-items: center; overflow: hidden;
      box-shadow: inset 0 0 0 8px rgba(255,255,255,.45);
    }
    .avatar-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .avatar-fallback { font-size: 58px; display: none; }
    .person-name { font-size: 24px; font-weight: 900; margin-bottom: 6px; }
    .person-worth { color: var(--muted); font-weight: 800; }
    .hero-main h1 {
      margin: 0 0 16px; color: #146e22; font-size: clamp(24px, 4vw, 38px);
      line-height: 1.05; letter-spacing: -.7px;
    }
    .quote {
      display: inline-flex; align-items: center; min-height: 64px; padding: 16px 22px;
      border-radius: 18px; background: #d9f0dd; color: #111;
      font-size: clamp(16px, 2vw, 22px); font-weight: 900; position: relative; max-width: 820px;
    }
    .quote::before {
      content: ""; position: absolute; left: -16px; top: 50%; transform: translateY(-50%);
      border-top: 14px solid transparent; border-bottom: 14px solid transparent; border-right: 18px solid #d9f0dd;
    }
    .status-row { display: grid; grid-template-columns: 1fr auto; gap: 16px; align-items: end; margin-top: 24px; }
    .timer-box { text-align: right; font-weight: 1000; color: var(--green-dark); font-size: 22px; white-space: nowrap; }
    .timer-box.danger { color: var(--red); animation: pulse .6s infinite alternate; }
    @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.04); } }
    .moneybar {
      height: 86px; background: #d5eee1; border: 2px solid #93d8b3; border-radius: 18px;
      overflow: hidden; position: relative; box-shadow: inset 0 0 0 1px rgba(255,255,255,.4);
    }
    .moneybar-fill {
      position: absolute; inset: 0 auto 0 0; width: 100%;
      background: linear-gradient(90deg, var(--green), #20b86e); transition: width .25s ease;
    }
    .moneybar-text {
      position: relative; z-index: 2; height: 100%; display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: clamp(24px, 5vw, 42px); font-weight: 1000; letter-spacing: 1px;
      text-shadow: 0 2px 0 rgba(0,0,0,.12);
    }
    .controls { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 18px; }
    .btn {
      border: 0; min-height: 44px; padding: 0 16px; border-radius: 14px;
      background: #fff; color: var(--text); font-weight: 900; cursor: pointer;
      box-shadow: 0 8px 22px rgba(0,0,0,.08);
      transition: transform .15s ease, opacity .15s ease, background .15s ease; user-select: none;
    }
    .btn:hover { transform: translateY(-1px); }
    .btn:active { transform: translateY(1px); }
    .btn.green { background: var(--green); color: #fff; }
    .btn.green:hover { background: var(--green-dark); }
    .btn.red { background: var(--red); color: #fff; }
    .btn.red:hover { background: var(--red-dark); }
    .btn.gray { background: #3f4448; color: #fff; }
    .btn:disabled { opacity: .45; cursor: not-allowed; transform: none; }
    .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin: 16px 0 20px; }
    .stat {
      background: rgba(255,255,255,.8); border: 1px solid rgba(255,255,255,.9);
      border-radius: 18px; padding: 15px; box-shadow: 0 10px 24px rgba(0,0,0,.05);
    }
    .stat-label {
      color: var(--muted); font-size: 13px; font-weight: 900;
      text-transform: uppercase; letter-spacing: .8px; margin-bottom: 6px;
    }
    .stat-value { font-size: 22px; font-weight: 1000; overflow: hidden; text-overflow: ellipsis; }
    .section-title {
      display: flex; align-items: center; justify-content: space-between; gap: 16px;
      margin: 28px 4px 14px;
    }
    .section-title h2 { margin: 0; font-size: 28px; letter-spacing: -.4px; }
    .search {
      width: min(420px, 100%); min-height: 46px; border: 1px solid var(--line);
      border-radius: 15px; padding: 0 14px; outline: none; font-weight: 800; background: #fff;
    }
    .products { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
    .card {
      background: var(--card); border-radius: 22px; border: 1px solid rgba(255,255,255,.8);
      min-height: 330px; padding: 22px; display: flex; flex-direction: column;
      align-items: center; justify-content: space-between; text-align: center;
      box-shadow: 0 10px 24px rgba(0,0,0,.055); overflow: hidden;
    }
    .product-img { width: 130px; height: 110px; object-fit: contain; margin-top: 6px; display: block; }
    .emoji-fallback { width: 130px; height: 110px; display: none; place-items: center; font-size: 72px; margin-top: 6px; }
    .product-name { font-size: 22px; font-weight: 1000; line-height: 1.15; margin: 14px 0 8px; }
    .product-price { font-size: 22px; margin-bottom: 12px; }
    .owned { min-height: 26px; color: var(--muted); font-weight: 900; margin-bottom: 14px; }
    .buy-row { width: 100%; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; align-items: center; }
    .buy-btn, .sell-btn { min-height: 54px; font-size: 20px; border-radius: 12px; }
    .receipt-panel {
      position: fixed; right: 18px; bottom: 18px; width: min(460px, calc(100vw - 36px));
      max-height: min(720px, calc(100vh - 36px)); background: #fff; border-radius: 24px;
      box-shadow: 0 20px 60px rgba(0,0,0,.18); border: 1px solid rgba(0,0,0,.06);
      padding: 18px; overflow: auto; transform: translateY(calc(100% + 30px)); transition: transform .25s ease; z-index: 30;
    }
    .receipt-panel.open { transform: translateY(0); }
    .receipt-head {
      display: flex; justify-content: space-between; align-items: center; gap: 12px;
      position: sticky; top: -18px; background: #fff; padding: 12px 0; z-index: 2;
    }
    .receipt-head h3 { margin: 0; font-size: 24px; }
    .receipt-item {
      display: grid; grid-template-columns: 1fr auto auto; gap: 12px; padding: 9px 0;
      border-bottom: 1px solid #edf0f2; align-items: center;
    }
    .receipt-item strong { font-weight: 900; }
    .receipt-item span { color: var(--muted); font-weight: 800; white-space: nowrap; }
    .receipt-total {
      display: flex; justify-content: space-between; gap: 14px; padding-top: 14px;
      margin-top: 6px; font-size: 20px; font-weight: 1000;
    }
    .records {
      background: #fff; border-radius: 22px; padding: 18px;
      box-shadow: 0 10px 24px rgba(0,0,0,.055); margin-top: 18px; display: none;
    }
    .records.show { display: block; }
    .records h3 { margin: 0 0 10px; font-size: 22px; }
    .record-line {
      display: flex; justify-content: space-between; gap: 16px;
      padding: 9px 0; border-bottom: 1px solid #edf0f2; font-weight: 900;
    }
    .toast {
      position: fixed; left: 50%; bottom: 22px; transform: translateX(-50%) translateY(30px);
      opacity: 0; background: #111; color: #fff; padding: 14px 18px; border-radius: 14px;
      font-weight: 900; box-shadow: 0 15px 40px rgba(0,0,0,.25);
      transition: all .2s ease; z-index: 50; text-align: center; max-width: calc(100vw - 36px);
    }
    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    .modal {
      position: fixed; inset: 0; background: rgba(0,0,0,.42); display: none;
      place-items: center; padding: 18px; z-index: 60;
    }
    .modal.open { display: grid; }
    .modal-card {
      width: min(560px, 100%); background: #fff; border-radius: 28px;
      padding: 24px; box-shadow: 0 24px 80px rgba(0,0,0,.26);
    }
    .modal-card h3 { margin: 0 0 8px; font-size: 28px; }
    .modal-card p { margin: 0 0 18px; color: var(--muted); font-weight: 800; line-height: 1.45; }
    .modal-actions { display: flex; gap: 10px; flex-wrap: wrap; justify-content: flex-end; }
    .empty {
      grid-column: 1 / -1; background: #fff; border-radius: 22px; padding: 30px;
      text-align: center; font-weight: 900; color: var(--muted);
    }
    @media (max-width: 980px) {
      .products { grid-template-columns: repeat(2, 1fr); }
      .stats { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 720px) {
      .app { padding: 14px 10px 70px; }
      .topbar { align-items: stretch; flex-direction: column; }
      .top-actions { justify-content: stretch; }
      .select, .mode-select, .top-actions .btn { width: 100%; }
      .hero { padding: 18px; border-radius: 24px; }
      .hero-grid { grid-template-columns: 1fr; }
      .quote::before { display: none; }
      .status-row { grid-template-columns: 1fr; }
      .timer-box { text-align: left; }
      .moneybar { height: 74px; }
      .stats { grid-template-columns: 1fr; }
      .section-title { flex-direction: column; align-items: stretch; }
      .products { grid-template-columns: 1fr; }
      .card { min-height: 300px; }
    }
  </style>
</head>

    <header class="topbar">
      <div class="brand">
        <button class="hamburger" id="receiptToggle" title="Открыть чек">☰</button>
        <div>AREALME 2.0<small>Игры · Потрать деньги</small></div>
      </div>
      <div class="top-actions">
        <select class="select" id="personSelect" aria-label="Выбор личности"></select>
        <select class="mode-select" id="modeSelect" aria-label="Выбор режима">
          <option value="free">Свободный режим</option>
          <option value="minute">Режим: потратить за 1 минуту</option>
          <option value="record">Режим: рекорд</option>
        </select>
        <button class="btn gray" id="resetBtn">Сбросить</button>
      </div>
    </header>

    <section class="hero">
      <div class="hero-grid">
        <div class="person">
          <div class="avatar-wrap">
            <img id="personImage" alt="" />
            <div class="avatar-fallback" id="avatarFallback">🤑</div>
          </div>
          <div class="person-name" id="personName"></div>
          <div class="person-worth" id="personWorth"></div>
        </div>
        <div class="hero-main">
          <h1 id="title">Потрать все деньги</h1>
          <div class="quote" id="quote"></div>
          <div class="status-row">
            <div class="moneybar">
              <div class="moneybar-fill" id="moneyFill"></div>
              <div class="moneybar-text" id="balanceText"></div>
            </div>
            <div class="timer-box" id="timerBox">⏱ 00:00.000</div>
          </div>
          <div class="controls">
            <button class="btn green" id="startBtn">Старт</button>
            <button class="btn" id="receiptBtn">Показать чек</button>
            <button class="btn" id="recordsBtn">Топ рекордов</button>
          </div>
        </div>
      </div>
    </section>

    <section class="stats">
      <div class="stat"><div class="stat-label">Осталось</div><div class="stat-value" id="statLeft"></div></div>
      <div class="stat"><div class="stat-label">Потрачено</div><div class="stat-value" id="statSpent"></div></div>
      <div class="stat"><div class="stat-label">Покупок</div><div class="stat-value" id="statCount"></div></div>
      <div class="stat"><div class="stat-label">Режим</div><div class="stat-value" id="statMode"></div></div>
    </section>

    <section class="records" id="recordsPanel">
      <h3>🏆 Топ 5 рекордов</h3>
      <div id="recordsList"></div>
    </section>

    <div class="section-title">
      <h2>Магазин безумных покупок</h2>
      <input class="search" id="searchInput" placeholder="Поиск: ракета, яхта, BMW..." />
    </div>

    <main class="products" id="products"></main>
  </div>

  <aside class="receipt-panel" id="receiptPanel">
    <div class="receipt-head">
      <h3>Ваш чек</h3>
      <button class="btn" id="closeReceipt">Закрыть</button>
    </div>
    <div id="receiptList"></div>
    <div class="receipt-total">
      <span>Итого</span>
      <span id="receiptTotal">$0</span>
    </div>
  </aside>

  <div class="toast" id="toast"></div>

  <div class="modal" id="finishModal">
    <div class="modal-card">
      <h3 id="finishTitle">Готово!</h3>
      <p id="finishText"></p>
      <div class="modal-actions">
        <button class="btn" id="modalReceipt">Открыть чек</button>
        <button class="btn green" id="modalReset">Играть ещё</button>
      </div>
    </div>
  </div>

    const $ = (id) => document.getElementById(id);

    const els = {
      personSelect: $("personSelect"), modeSelect: $("modeSelect"), personImage: $("personImage"),
      avatarFallback: $("avatarFallback"), personName: $("personName"), personWorth: $("personWorth"),
      title: $("title"), quote: $("quote"), balanceText: $("balanceText"), moneyFill: $("moneyFill"),
      timerBox: $("timerBox"), startBtn: $("startBtn"), resetBtn: $("resetBtn"), products: $("products"),
      statLeft: $("statLeft"), statSpent: $("statSpent"), statCount: $("statCount"), statMode: $("statMode"),
      receiptPanel: $("receiptPanel"), receiptToggle: $("receiptToggle"), receiptBtn: $("receiptBtn"),
      closeReceipt: $("closeReceipt"), receiptList: $("receiptList"), receiptTotal: $("receiptTotal"),
      recordsPanel: $("recordsPanel"), recordsBtn: $("recordsBtn"), recordsList: $("recordsList"),
      searchInput: $("searchInput"), toast: $("toast"), finishModal: $("finishModal"),
      finishTitle: $("finishTitle"), finishText: $("finishText"), modalReceipt: $("modalReceipt"), modalReset: $("modalReset")
    };

    const state = {
      personId: "elon",
      mode: "free",
      quantities: {},
      balance: PEOPLE[0].netWorth,
      started: false,
      finished: false,
      startTime: 0,
      elapsedMs: 0,
      minuteDeadline: 0,
      raf: 0
    };

    const formatter = new Intl.NumberFormat("en-US", { maximumFractionDigits: 0 });

    function money(value) {
      return "$" + formatter.format(Math.max(0, Math.floor(value)));
    }

    function compactMoney(value) {
      if (value >= 1_000_000_000_000) return "$" + (value / 1_000_000_000_000).toFixed(value % 1_000_000_000_000 === 0 ? 0 : 1) + " трлн";
      if (value >= 1_000_000_000) return "$" + (value / 1_000_000_000).toFixed(value % 1_000_000_000 === 0 ? 0 : 1) + " млрд";
      if (value >= 1_000_000) return "$" + (value / 1_000_000).toFixed(value % 1_000_000 === 0 ? 0 : 1) + " млн";
      if (value >= 1_000) return "$" + (value / 1_000).toFixed(value % 1_000 === 0 ? 0 : 1) + " тыс.";
      return money(value);
    }

    function timeText(ms) {
      const safe = Math.max(0, Math.floor(ms));
      const minutes = Math.floor(safe / 60000);
      const seconds = Math.floor((safe % 60000) / 1000);
      const millis = safe % 1000;
      return String(minutes).padStart(2, "0") + ":" + String(seconds).padStart(2, "0") + "." + String(millis).padStart(3, "0");
    }

    function getPerson() { return PEOPLE.find(p => p.id === state.personId) || PEOPLE[0]; }
    function getSpent() { return PRODUCTS.reduce((sum, product) => sum + (state.quantities[product.id] || 0) * product.price, 0); }
    function getItemsCount() { return Object.values(state.quantities).reduce((a, b) => a + b, 0); }
    function getModeName() { return state.mode === "minute" ? "1 минута" : state.mode === "record" ? "Рекорд" : "Свободный"; }

    function saveState() {
      localStorage.setItem("moneyGame:lastPerson", state.personId);
      localStorage.setItem("moneyGame:lastMode", state.mode);
    }

    function showToast(text) {
      els.toast.textContent = text;
      els.toast.classList.add("show");
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => els.toast.classList.remove("show"), 1500);
    }

    function resetGame(keepPersonAndMode = true) {
      cancelAnimationFrame(state.raf);
      const selectedPerson = keepPersonAndMode ? state.personId : "elon";
      const selectedMode = keepPersonAndMode ? state.mode : "free";
      state.personId = selectedPerson;
      state.mode = selectedMode;
      state.quantities = {};
      state.balance = getPerson().netWorth;
      state.started = false;
      state.finished = false;
      state.startTime = 0;
      state.elapsedMs = 0;
      state.minuteDeadline = 0;
      els.finishModal.classList.remove("open");
      updateUI();
      renderProducts();
    }

    function startGame() {
      if (state.finished) return;
      const now = performance.now();

      if (state.mode === "minute") {
        state.started = true;
        state.startTime = now;
        state.minuteDeadline = now + 60000;
        showToast("Таймер пошёл: 60 секунд!");
        tick();
      } else if (state.mode === "record") {
        showToast("Рекорд начнётся с первой покупки.");
      } else {
        state.started = true;
        state.startTime = now;
        showToast("Свободный режим включён.");
        tick();
      }
      updateUI();
    }

    function ensureStartedByPurchase() {
      if (state.mode === "record" && !state.started) {
        state.started = true;
        state.startTime = performance.now();
        tick();
      }
      if (state.mode === "free" && !state.started) {
        state.started = true;
        state.startTime = performance.now();
        tick();
      }
    }

    function finishGame(reason) {
      if (state.finished) return;
      state.finished = true;
      cancelAnimationFrame(state.raf);
      const spent = getSpent();
      let title = "Деньги потрачены!";
      let text = "Ты потратил " + money(spent) + ".";

      if (state.mode === "record") {
        const elapsed = performance.now() - state.startTime;
        state.elapsedMs = elapsed;
        saveRecord(elapsed);
        title = "Рекорд зафиксирован!";
        text = "Ты полностью потратил состояние " + getPerson().name + " за " + timeText(elapsed) + ".";
        renderRecords();
      }

      if (reason === "timeout") {
        title = "Время вышло!";
        text = "За минуту ты потратил " + money(spent) + ". Осталось: " + money(state.balance) + ".";
      }

      if (reason === "empty" && state.mode === "minute") {
        const used = 60000 - Math.max(0, state.minuteDeadline - performance.now());
        text = "Ты успел потратить всё за " + timeText(used) + " до конца минуты!";
      }

      els.finishTitle.textContent = title;
      els.finishText.textContent = text;
      els.finishModal.classList.add("open");
      updateUI();
    }

    function tick() {
      if (state.finished) return;
      const now = performance.now();

      if (state.started && state.startTime) state.elapsedMs = now - state.startTime;

      if (state.mode === "minute" && state.started) {
        const left = state.minuteDeadline - now;
        if (left <= 0) {
          state.elapsedMs = 60000;
          updateUI();
          finishGame("timeout");
          return;
        }
      }

      updateTimer();
      state.raf = requestAnimationFrame(tick);
    }

    function updateTimer() {
      els.timerBox.classList.remove("danger");
      if (state.mode === "minute") {
        const left = state.started ? state.minuteDeadline - performance.now() : 60000;
        els.timerBox.textContent = "⏱ " + timeText(left);
        if (left <= 10000 && state.started) els.timerBox.classList.add("danger");
        return;
      }
      if (state.mode === "record") {
        els.timerBox.textContent = state.started ? "⏱ " + timeText(performance.now() - state.startTime) : "⏱ старт с покупки";
        return;
      }
      els.timerBox.textContent = state.started ? "⏱ " + timeText(performance.now() - state.startTime) : "⏱ без лимита";
    }

    function updateVisibleOwned() {
      document.querySelectorAll(".card").forEach(card => {
        const owned = state.quantities[card.dataset.id] || 0;
        const el = card.querySelector(".owned");
        if (el) el.textContent = "Куплено: " + formatter.format(owned);
        const sellBtn = card.querySelector(".sell-btn");
        if (sellBtn) sellBtn.disabled = owned <= 0 || state.finished;
      });
    }

    function updateUI() {
      const person = getPerson();
      const spent = getSpent();
      state.balance = Math.max(0, person.netWorth - spent);
      const percentLeft = person.netWorth === 0 ? 0 : (state.balance / person.netWorth) * 100;

      els.personName.textContent = person.name;
      els.personWorth.textContent = "Состояние: " + compactMoney(person.netWorth);
      els.title.textContent = "Потрать все деньги " + person.name;
      els.quote.textContent = person.quote;
      els.balanceText.textContent = money(state.balance);
      els.moneyFill.style.width = Math.max(0, Math.min(100, percentLeft)) + "%";

      els.statLeft.textContent = money(state.balance);
      els.statSpent.textContent = money(spent);
      els.statCount.textContent = formatter.format(getItemsCount());
      els.statMode.textContent = getModeName();

      els.startBtn.textContent = state.mode === "minute" ? "Старт 60 сек" : state.mode === "record" ? "Готов к рекорду" : "Старт";
      els.startBtn.disabled = state.finished || (state.mode === "record" && state.started) || (state.mode === "free" && state.started) || (state.mode === "minute" && state.started);

      els.personImage.src = person.image;
      els.personImage.alt = person.name;
      els.personImage.style.display = "block";
      els.avatarFallback.style.display = "none";
      els.personSelect.value = state.personId;
      els.modeSelect.value = state.mode;

      updateTimer();
      updateVisibleOwned();
      renderReceipt();

      if (state.balance <= 0 && !state.finished) finishGame("empty");
    }

    function renderPeopleOptions() {
      els.personSelect.innerHTML = PEOPLE.map(person =>
        '<option value="' + person.id + '">' + person.name + " — " + compactMoney(person.netWorth) + "</option>"
      ).join("");
    }

    function renderProducts() {
      const query = els.searchInput.value.trim().toLowerCase();
      const visible = PRODUCTS.filter(p => p.name.toLowerCase().includes(query));

      if (!visible.length) {
        els.products.innerHTML = '<div class="empty">Ничего не найдено. Попробуй другой запрос.</div>';
        return;
      }

      els.products.innerHTML = visible.map(product => `
        <article class="card" data-id="${product.id}">
          <div>
            <img class="product-img" src="${product.image}" alt="${product.name}" loading="lazy">
            <div class="emoji-fallback">${product.emoji}</div>
            <div class="product-name">${product.name}</div>
            <div class="product-price">${money(product.price)}</div>
            <div class="owned">Куплено: ${formatter.format(state.quantities[product.id] || 0)}</div>
          </div>
          <div class="buy-row">
            <button class="btn red sell-btn">Продать</button>
            <button class="btn green buy-btn">Купить</button>
          </div>
        </article>
      `).join("");

      els.products.querySelectorAll(".product-img").forEach(img => {
        img.addEventListener("error", () => {
          img.style.display = "none";
          const fallback = img.nextElementSibling;
          if (fallback) fallback.style.display = "grid";
        });
      });
      updateVisibleOwned();
    }

    function getProductFromCard(card) { return PRODUCTS.find(p => p.id === card.dataset.id); }

    function buy(product) {
      if (state.finished) return;
      if (state.mode === "minute" && !state.started) {
        showToast("Сначала нажми «Старт 60 сек».");
        return;
      }
      ensureStartedByPurchase();

      if (state.balance < product.price) {
        showToast("На это уже не хватает денег.");
        return;
      }

      state.quantities[product.id] = (state.quantities[product.id] || 0) + 1;
      state.balance -= product.price;
      updateUI();
    }

    function sell(product) {
      if (state.finished) return;
      const current = state.quantities[product.id] || 0;
      if (current <= 0) {
        showToast("Сначала купи этот товар.");
        return;
      }

      state.quantities[product.id] = current - 1;
      if (state.quantities[product.id] <= 0) delete state.quantities[product.id];
      state.balance += product.price;
      updateUI();
    }

    function renderReceipt() {
      const bought = PRODUCTS.filter(p => state.quantities[p.id] > 0);

      if (!bought.length) {
        els.receiptList.innerHTML = '<div class="empty">Пока чек пустой.</div>';
        els.receiptTotal.textContent = "$0";
        return;
      }

      els.receiptList.innerHTML = bought.map(product => {
        const qty = state.quantities[product.id];
        return `
          <div class="receipt-item">
            <strong>${product.name}</strong>
            <span>×${formatter.format(qty)}</span>
            <span>${money(product.price * qty)}</span>
          </div>
        `;
      }).join("");

      els.receiptTotal.textContent = money(getSpent());
    }

    function recordsKey() { return "moneyGame:records:" + state.personId; }

    function getRecords() {
      try { return JSON.parse(localStorage.getItem(recordsKey())) || []; }
      catch (e) { return []; }
    }

    function saveRecord(ms) {
      const records = getRecords();
      records.push({ ms, date: new Date().toLocaleString("ru-RU") });
      records.sort((a, b) => a.ms - b.ms);
      localStorage.setItem(recordsKey(), JSON.stringify(records.slice(0, 5)));
    }

    function renderRecords() {
      const records = getRecords();
      els.recordsPanel.classList.add("show");

      if (!records.length) {
        els.recordsList.innerHTML = '<div class="empty">Пока рекордов нет. Включи режим рекорда и потрать всё.</div>';
        return;
      }

      els.recordsList.innerHTML = records.map((record, index) => `
        <div class="record-line">
          <span>#${index + 1} · ${record.date}</span>
          <span>${timeText(record.ms)}</span>
        </div>
      `).join("");
    }

    function bindEvents() {
      els.personSelect.addEventListener("change", () => {
        state.personId = els.personSelect.value;
        saveState();
        resetGame(true);
        renderRecords();
      });

      els.modeSelect.addEventListener("change", () => {
        state.mode = els.modeSelect.value;
        saveState();
        resetGame(true);
      });

      els.startBtn.addEventListener("click", startGame);
      els.resetBtn.addEventListener("click", () => resetGame(true));
      els.searchInput.addEventListener("input", renderProducts);

      els.receiptToggle.addEventListener("click", () => els.receiptPanel.classList.toggle("open"));
      els.receiptBtn.addEventListener("click", () => els.receiptPanel.classList.add("open"));
      els.closeReceipt.addEventListener("click", () => els.receiptPanel.classList.remove("open"));

      els.recordsBtn.addEventListener("click", () => {
        els.recordsPanel.classList.toggle("show");
        if (els.recordsPanel.classList.contains("show")) renderRecords();
      });

      els.modalReceipt.addEventListener("click", () => {
        els.finishModal.classList.remove("open");
        els.receiptPanel.classList.add("open");
      });

      els.modalReset.addEventListener("click", () => resetGame(true));

      els.personImage.addEventListener("error", () => {
        els.personImage.style.display = "none";
        els.avatarFallback.style.display = "block";
      });

      els.products.addEventListener("click", (event) => {
        const card = event.target.closest(".card");
        if (!card) return;
        const product = getProductFromCard(card);
        if (!product) return;
        if (event.target.closest(".buy-btn")) buy(product);
        if (event.target.closest(".sell-btn")) sell(product);
      });
    }

    function init() {
      const savedPerson = localStorage.getItem("moneyGame:lastPerson");
      const savedMode = localStorage.getItem("moneyGame:lastMode");

      if (PEOPLE.some(p => p.id === savedPerson)) state.personId = savedPerson;
      if (["free", "minute", "record"].includes(savedMode)) state.mode = savedMode;

      renderPeopleOptions();
      bindEvents();
      resetGame(true);
      renderRecords();
    }

    init();
  </script>
</body>
